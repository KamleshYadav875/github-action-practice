# Workflow

# Should have name
name: Hello

# On tells when the workflow should run
on: 
  workflow_dispatch: 

# Jobs
# Should be inside the workflow
# jobs tells what the workflow should do, there can be one or more jobs, hence we write jobs branch_protection_rule.
# Jobs is an object so need indentation
jobs:
  # First Job
  say-hello:
    # Create an Ephermal container with Ubuntu running
    runs-on: ubuntu-latest
    steps:
      - name: Say hellp to everyone
        run: echo "Hello Dosto"
